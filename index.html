<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Situation Monitor OSINT Dashboard</title>
  <link rel="preconnect" href="https://unpkg.com" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="title-wrap">
        <h1>Situation Monitor</h1>
        <span class="status-dot" title="Live"></span>
      </div>
      <div class="controls-wrap">
        <label class="control search-control">
          <span>Search</span>
          <input id="search-input" type="search" placeholder="Find events, locations, categories..." />
        </label>
        <label class="control">
          <span>Time</span>
          <select id="time-filter">
            <option value="1h">1h</option>
            <option value="6h">6h</option>
            <option value="24h" selected>24h</option>
            <option value="7d">7d</option>
          </select>
        </label>
        <div class="layer-toggles" role="group" aria-label="Map layers">
          <label><input type="checkbox" data-layer="events" checked /> Events</label>
          <label><input type="checkbox" data-layer="aircraft" checked /> Aircraft</label>
          <label><input type="checkbox" data-layer="ships" checked /> Ships</label>
          <label><input type="checkbox" data-layer="heatmap" checked /> Heatmap</label>
        </div>
      </div>
    </header>

    <main class="dashboard">
      <aside class="panel left-panel">
        <div class="panel-header">
          <h2>Live Event Feed</h2>
          <span id="event-count">0 events</span>
        </div>
        <ul id="event-feed" class="event-feed" aria-live="polite"></ul>
      </aside>

      <section class="panel map-panel">
        <div id="map" aria-label="OSINT map"></div>
      </section>

      <aside class="panel right-panel">
        <div class="panel-header">
          <h2>Event Details</h2>
        </div>
        <div id="details-panel" class="details-empty">
          <p>Select an event marker or feed item to view details.</p>
        </div>
      </aside>
    </main>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
  <script src="data.js"></script>
  <script src="news.js"></script>
  <script src="map.js"></script>
  <script src="ws.js"></script>
  <script src="app.js"></script>
</body>
</html>
